<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartBooks AI - Instant Scan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-md w-full bg-slate-800 p-8 rounded-[2rem] shadow-2xl border border-slate-700">
        <h1 class="text-3xl font-black text-blue-500 italic mb-6">SmartBooks AI</h1>
        
        <input type="file" id="fileInp" class="hidden" accept="image/*">
        <button onclick="document.getElementById('fileInp').click()" 
                class="w-full py-12 border-2 border-dashed border-slate-600 rounded-2xl hover:border-blue-500 hover:bg-slate-700 transition-all mb-6">
            <span class="text-4xl block mb-2">📄</span>
            <span class="font-bold">Click to Scan Receipt</span>
        </button>

        <div id="loader" class="hidden text-center text-blue-400 font-bold animate-pulse mb-6">
            ⚡ ENGINE PROCESSING...
        </div>

        <div id="result" class="hidden space-y-4 bg-slate-900/50 p-6 rounded-2xl border border-slate-700">
            <div>
                <p class="text-[10px] uppercase text-slate-500 font-bold">Vendor</p>
                <p id="v" class="text-xl font-bold text-blue-300">---</p>
            </div>
            <div class="flex justify-between">
                <div>
                    <p class="text-[10px] uppercase text-slate-500 font-bold">Total</p>
                    <p id="t" class="text-2xl font-black text-emerald-400">---</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] uppercase text-slate-500 font-bold">Date</p>
                    <p id="d" class="text-sm text-slate-400 font-bold">---</p>
                </div>
            </div>
            <button onclick="location.reload()" class="w-full py-3 bg-blue-600 rounded-xl font-bold mt-4">New Scan</button>
        </div>
    </div>

    <script>
        document.getElementById('fileInp').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('loader').classList.remove('hidden');
            const fd = new FormData();
            fd.append('image', file);

            try {
                const res = await fetch('http://127.0.0.1:5000/scan', { method: 'POST', body: fd });
                const data = await res.json();

                document.getElementById('v').innerText = data.vendor;
                document.getElementById('t').innerText = data.total + " " + data.currency;
                document.getElementById('d').innerText = data.date;
                
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('result').classList.remove('hidden');
            } catch (err) {
                alert("Backend not responding. Run 'py app.py' in your terminal!");
            }
        };
    </script>
</body>
</html>
